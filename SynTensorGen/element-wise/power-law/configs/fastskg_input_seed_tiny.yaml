name: fastskg_input_seed_tiny
output_dir: generated

generator:
  type: fastskg
  random_seed: 7

tensor:
  sizes: [16, 16]
  index_base: 0
  nnz: 128

format:
  storage: coordinate
  index_type: uint64
  endianness: little
  sorted: lexicographic
  sorted_order: [0, 1]
  explicit_zeros: disallowed
  pattern_symmetry: no
  numerical_symmetry: no
  sparsity_type: element
  dense_modes: []

seed:
  source: input_tns
  input_tns: ../seeds/tiny_2d_seed.tns
  sizes: [2, 2]

fastskg:
  iter: 4

value:
  type: float64
  mode: constant
  constant: 1.0

duplicates:
  policy: keep

output:
  write_tns: true
  write_tnsb: true
  write_metadata: true
  write_readme: true
  copy_config: true
